<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Dashboard</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebar" class="col-md-3 col-lg-2 bg-light">
                <div class="sidebar-grid py-4">
                    <label id="label1" class="btn btn-outline-primary section-btn">1</label>
                    <label id="label2" class="btn btn-outline-primary section-btn">2</label>
                    <label id="label3" class="btn btn-outline-primary section-btn">3</label>

                    <div class="big-display">
                        <span id="show1" class="display-1">1</span>
                        <span id="show2" class="display-1">2</span>
                        <span id="show3" class="display-1">3</span>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10">
                <div class="d-flex align-items-center" style="height: 80vh; padding-left: 50px;">
                    <!-- El número grande aparece junto a los botones, dentro del sidebar -->
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
