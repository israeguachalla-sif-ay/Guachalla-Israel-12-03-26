<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Dashboard</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <input type="radio" id="tab1" name="tabs" checked style="display: none;">
            <input type="radio" id="tab2" name="tabs" style="display: none;">
            <input type="radio" id="tab3" name="tabs" style="display: none;">
            <!-- Sidebar -->
            <nav id="sidebar" class="col-md-3 bg-light">
                <div class="d-flex flex-column align-items-center py-4">
                    <label for="tab1" class="btn btn-outline-primary mb-3 section-btn">1</label>
                    <label for="tab2" class="btn btn-outline-primary mb-3 section-btn">2</label>
                    <label for="tab3" class="btn btn-outline-primary mb-3 section-btn">3</label>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9">
                <div class="d-flex align-items-center" style="height: 80vh; padding-left: 50px;">
                    <div id="content-display">
                        <span id="section1" class="display-1">1</span>
                        <span id="section2" class="display-1">2</span>
                        <span id="section3" class="display-1">3</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
