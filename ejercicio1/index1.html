<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Dashboard</span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebar" class="col-md-3 bg-light">
                <div class="d-flex flex-column align-items-center py-4">
                    <button class="btn btn-outline-primary mb-3 section-btn" data-section="1">1</button>
                    <button class="btn btn-outline-primary mb-3 section-btn" data-section="2">2</button>
                    <button class="btn btn-outline-primary mb-3 section-btn" data-section="3">3</button>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9">
                <div class="d-flex align-items-center" style="height: 80vh; padding-left: 50px;">
                    <div id="content-display">
                        <span id="big-number" class="display-1">1</span>
                    </div>
                </div>
            </main>
        </div>
    <script src="js/script.js"></script>
</body>
</html>
