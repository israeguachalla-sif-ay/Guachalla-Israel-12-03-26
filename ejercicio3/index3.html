<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Datos Personales</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Datos Personales</h1>
    <form id="formulario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre">
        <span class="error" id="error-nombre"></span><br><br>

        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido">
        <span class="error" id="error-apellido"></span><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email">
        <span class="error" id="error-email"></span><br><br>

        <label for="telefono">Teléfono:</label>
        <input type="tel" id="telefono">
        <span class="error" id="error-telefono"></span><br><br>

        <button type="submit">Enviar</button>
    </form>
    <script src="js/script.js"></script>
</body>
</html>
